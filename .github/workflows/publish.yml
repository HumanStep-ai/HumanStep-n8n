name: Publish

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      # Prefer NPM_TOKEN (granular publish token on humanstepai). Falls back to OIDC
      # Trusted Publisher when NPM_TOKEN is not set — requires npm package settings.
      - name: Publish to npm
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            npm publish --access public
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
